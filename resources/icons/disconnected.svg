<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 断网状态图标（红色） -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 圆形背景 -->
  <circle cx="32" cy="32" r="28" fill="url(#grad)" opacity="0.15"/>
  <!-- WiFi 信号图标（灰色，表示断开） -->
  <path d="M32 44 a2 2 0 1 0 0-4 a2 2 0 0 0 0 4z" fill="#ef4444"/>
  <path d="M24 38 a11 11 0 0 1 16 0" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M18 32 a19 19 0 0 1 28 0" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M12 26 a27 27 0 0 1 40 0" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.2"/>
  <!-- 断线 X 标记 -->
  <line x1="22" y1="22" x2="42" y2="42" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  <line x1="42" y1="22" x2="22" y2="42" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
</svg>
